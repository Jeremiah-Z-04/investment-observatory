<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>投资观察站 — 汕头游资专用</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--bg:#080d1f;--card:#0f1535;--border:#1a2358;--text:#c8d4e8;--muted:#5a6599;--accent:#4f8cff;--green:#00d4aa;--red:#ff4d6a;--yellow:#ffb020;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar{width:200px;min-width:200px;background:var(--card);border-right:1px solid var(--border);padding:16px 0;position:fixed;left:0;top:0;bottom:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar .logo{padding:0 16px 14px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sidebar .logo h2{font-size:14px;font-weight:700;color:#fff}
.sidebar .logo p{font-size:10px;color:var(--muted);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px 18px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;border-right:2px solid transparent;user-select:none}
.nav-item:hover{background:rgba(79,140,255,.06);color:var(--accent)}
.nav-item.active{background:rgba(79,140,255,.08);color:var(--accent);border-right-color:var(--accent)}
.nav-item .ni{font-size:14px;width:18px;text-align:center}
.sidebar .footer{padding:12px 14px;border-top:1px solid var(--border);margin-top:auto;font-size:10px;color:var(--muted)}
#main{margin-left:200px;padding:20px 24px;overflow-y:auto;flex:1;min-height:100vh;width:calc(100% - 200px)}
.banner{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.bcard{flex:1;min-width:120px;background:var(--card);border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.bcard .bl{font-size:10px;color:var(--muted);margin-bottom:3px}
.bcard .bv{font-size:17px;font-weight:700;color:#fff}
.card{background:var(--card);border-radius:12px;padding:16px 18px;border:1px solid var(--border);margin-bottom:14px}
.card-sm{padding:12px 14px;border-radius:10px;margin-bottom:10px}
.text-lg{font-size:15px;font-weight:600;color:#fff}
.text-sm{font-size:11px}
.text-muted{color:var(--muted)}
.mb8{margin-bottom:8px}
.mb16{margin-bottom:16px}
.mt4{margin-top:4px}
.mt8{margin-top:8px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
table.tbl th{color:var(--muted);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);font-weight:500}
table.tbl td{padding:7px 8px;border-bottom:1px solid rgba(26,35,88,.4)}
table.tbl tbody tr{transition:all .1s}
table.tbl tbody tr:hover{background:rgba(79,140,255,.03)}
.tag{padding:2px 8px;border-radius:10px;font-size:10px;display:inline-block;font-weight:500}
.tag-g{background:rgba(0,212,170,.12);color:var(--green)}.tag-y{background:rgba(255,176,32,.12);color:var(--yellow)}.tag-r{background:rgba(255,77,106,.12);color:var(--red)}.tag-b{background:rgba(79,140,255,.12);color:var(--accent)}
.alert{border-left:3px solid var(--yellow);background:rgba(255,176,32,.04);padding:10px 14px;border-radius:8px;margin-bottom:6px;font-size:12px}
.alert-r{border-left-color:var(--red);background:rgba(255,77,106,.05)}
.alert-b{border-left-color:var(--accent);background:rgba(79,140,255,.05)}
.btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.btn-a{background:var(--accent);color:#fff}.btn-a:hover{opacity:.85}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer}.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.btn-p{background:var(--purple);color:#fff}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;width:100%}
input:focus{border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:var(--card);border-radius:14px;padding:28px;width:400px;max-width:90vw;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}
.modal-box h3{font-size:16px;margin-bottom:14px;color:#fff}
.chart-wrap{width:100%;height:100%}
.section-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent);display:flex;align-items:center;gap:8px}
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.industry-item{padding:8px 10px;font-size:12px;cursor:pointer;border-radius:6px;transition:all .1s;margin-bottom:2px;color:var(--muted)}
.industry-item:hover{background:rgba(79,140,255,.06);color:var(--accent)}
.industry-item.active{background:rgba(79,140,255,.1);color:var(--accent);font-weight:600}
#st{font-size:11px;padding:3px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
.view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.progress{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-top:6px}
.progress .bar{height:100%;border-radius:3px;transition:width .5s}
.anim-fade{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Mode switch buttons */
.mode-btn{padding:4px 12px;font-size:11px;border-radius:5px;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:transparent;color:var(--muted)}
.mode-btn.btn-a{background:var(--accent);color:#fff;border-color:var(--accent)}
.mode-btn.btn-a:hover{opacity:.85}
.mode-btn.btn-o:hover{border-color:var(--accent);color:var(--accent)}

/* Factor card grid */
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Decision bar inside factor cards */
.decide-bar{font-size:10px;padding:5px 8px;background:rgba(255,255,255,0.03);border-radius:5px;color:var(--text);border-left:2px solid var(--accent);margin-top:6px}

/* Level tag */
.level-tag{font-size:10px;padding:2px 8px;border-radius:8px;display:inline-block;font-weight:500}

/* Expanded card content */
.fc-content{display:none;margin-top:6px;padding:5px 8px;font-size:10px;color:var(--red);background:rgba(255,77,106,0.06);border-radius:5px}

/* Flash animation for value updates */
@keyframes flash{0%{opacity:1;background:rgba(79,140,255,0.15)}50%{opacity:.7}100%{opacity:1;background:transparent}}
.flash{animation:flash .6s ease}

/* Offline overlay */
.offline-overlay{position:absolute;z-index:50;top:80px;left:50%;transform:translateX(-50%);background:var(--card);padding:12px 24px;border:1px solid var(--yellow);border-radius:10px;font-size:13px;color:var(--yellow)}

/* Factor chain progress bar */
.chain-bar{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-bottom:2px}
.chain-bar .fill{height:100%;border-radius:3px;transition:width 0.5s}

/* Summary line with model results */
.summary-line{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}

/* Big conclusion card */
.conclusion-card{flex:0 0 220px;background:var(--card);border-radius:12px;border:1px solid var(--border);padding:16px;display:flex;flex-direction:column;justify-content:center}
.conclusion-card .score{font-size:36px;font-weight:800;line-height:1}
.conclusion-card .label{font-size:10px;color:var(--muted);margin-bottom:4px}
.conclusion-card .meta{font-size:11px;color:var(--muted);margin-top:4px}
.conclusion-card .meta span{font-weight:600}

/* Indicator matrix grid */
.indicator-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.indicator-grid .item{background:var(--card);border-radius:8px;border:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;justify-content:center}
.indicator-grid .item .label{font-size:10px;color:var(--muted)}
.indicator-grid .item .value{font-size:18px;font-weight:700}

/* Responsive adjustments */
@media(max-width:900px){.conclusion-card{flex:1 1 100%}.indicator-grid{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.factor-grid,.sidebar{display:none}#main{margin-left:0;width:100%}}


/* Industry page */
.chain-item{padding:8px 10px;font-size:12px;cursor:pointer;border-radius:6px;margin-bottom:2px;color:var(--muted);transition:all .1s;border-left:2px solid transparent}
.chain-item:hover{background:rgba(79,140,255,.06);color:var(--accent)}
.chain-item.active{background:rgba(79,140,255,.1);color:var(--accent);font-weight:600;border-left-color:var(--accent)}
.tab-btn{padding:2px 8px;cursor:pointer;color:var(--muted);font-size:10px;transition:all .1s}
.tab-btn:hover{color:var(--accent);background:rgba(79,140,255,.04);border-radius:3px}


.cmp-line{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap}

/* AI复盘助手 */
.ai-tabs{display:flex;gap:4px;margin-bottom:12px}
.ai-tab{padding:8px 16px;cursor:pointer;border-radius:6px;font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--border);transition:all .2s}
.ai-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(79,140,255,.1)}
.ai-tab:hover{color:var(--text)}
.ai-layout{display:flex;gap:12px}
.ai-left{flex:1;min-width:280px}
.ai-right{flex:1.5;min-width:300px}
.ai-field{margin-bottom:10px;padding:8px 10px;background:rgba(15,21,53,.5);border-radius:6px}
.ai-field label{display:block;font-size:11px;color:var(--text);margin-bottom:3px}
.ai-auto{display:inline-block;font-size:9px;color:var(--green);margin-left:6px}
.ai-manual{display:inline-block;font-size:9px;color:var(--yellow);margin-left:6px}
.ai-val{font-size:11px;color:var(--muted);margin-top:2px}
#aiResultContent{background:rgba(0,0,0,.3);border-radius:6px;padding:10px;font-size:11px;line-height:1.7;white-space:pre-wrap;font-family:Consolas,monospace;min-height:200px;color:var(--text);overflow-x:auto}
@media(max-width:900px){.ai-layout{flex-direction:column}}

/* ===== Review Summary Page ===== */
.rs-tabs{display:flex;gap:4px;margin-bottom:12px;background:rgba(15,21,53,.6);border-radius:8px;padding:3px;width:fit-content}
.rs-tab{padding:7px 16px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--muted);transition:all .15s}
.rs-tab.active{background:var(--accent);color:#fff}
.rs-layout{display:grid;grid-template-columns:380px 1fr;gap:12px}
@media(max-width:900px){.rs-layout{grid-template-columns:1fr}}
.rs-left .card,.rs-right .card{padding:12px}
.rs-field{margin-bottom:8px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--border)}
.rs-field label{display:block;font-size:10px;color:var(--muted);margin-bottom:2px}
.rs-field .rs-val{font-size:12px;color:var(--text)}
.rs-auto{font-size:9px;color:var(--green);margin-left:6px}
.rs-manual{font-size:9px;color:var(--yellow);margin-left:6px}
.rs-result{font-size:12px;line-height:1.8;white-space:pre-wrap;font-family:Consolas,monospace;min-height:200px}
.rs-result .hl{color:var(--accent);font-weight:600}
.rs-result .hlg{color:var(--green);font-weight:600}
.rs-result .hlr{color:var(--red);font-weight:600}
.rs-result .hlw{color:var(--yellow);font-weight:600}
.rs-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px;font-size:11px;box-sizing:border-box}
.rs-input:focus{outline:none;border-color:var(--accent)}
.rs-select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px;font-size:11px}
.rs-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;margin-left:4px}
.rs-tag-g{background:rgba(0,212,170,.15);color:var(--green)}
.rs-tag-r{background:rgba(255,77,106,.15);color:var(--red)}
.rs-tag-y{background:rgba(255,176,32,.15);color:var(--yellow)}
.rs-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(79,140,255,.15);color:var(--accent)}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar">
  <div class="logo"><h2>投资观察站</h2><p>汕头游资专用</p></div>
  <div class="nav-item active" data-page="home"><span class="ni">📊</span>四因子看板</div>
  <div class="nav-item" data-page="industry"><span class="ni">🔗</span>产业逻辑</div>
  <div class="nav-item" data-page="review"><span class="ni">📋</span>复盘工具</div>
    <div class="nav-item" data-page="volume"><span class="ni">💡</span>量能监测</div>
  <div class="nav-item" data-page="review_summary"><span class="ni">📝</span>盘后复盘</div>
  <div class="nav-item" data-page="history"><span class="ni">📜</span>历史数据</div>
  <div class="footer">
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <button id="themeBtn" class="btn btn-o btn-sm" onclick="var b=document.body;b.classList.toggle('light');this.textContent=b.classList.contains('light')?'☀':'☾';localStorage.setItem('inv_theme',b.classList.contains('light')?'light':'dark')" title="Theme">☾</button>
      <button id="langBtn" class="btn btn-o btn-sm">EN</button>
    </div>
    <div id="ts" style="font-size:10px;margin-bottom:6px">--</div>
    <div><span id="st">● --</span></div>
    <button class="btn btn-a btn-sm" onclick="S.refresh()" style="width:100%;margin-top:8px">🔄 刷新数据</button>
  </div>
</nav>
<div class="modal-overlay" id="modal"><div class="modal-box" id="modalBody"></div></div>
<main id="main"></main>
<script>(function(){var t=localStorage.getItem("inv_theme");if(t==="light")document.body.classList.add("light");})()</script>
<script src="app.js"></script>
</body>
</html>
