<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<title>投资观察站 · A股短线实时监控决策系统</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://unpkg.com/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://unpkg.com/animejs@3.2.1/lib/anime.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="M18 17V9"/>
          <path d="M13 17V5"/>
          <path d="M8 17v-3"/>
        </svg>
      </div>
      <div>
        <div class="brand-title">投资观察站</div>
        <div class="brand-subtitle">汕头游资专用</div>
      </div>
    </div>

    <nav class="nav-menu">
      <div class="nav-item active" data-page="home">
        <div class="nav-icon"><i class="fas fa-th-large"></i></div>
        <span>四因子看板</span>
      </div>
      <div class="nav-item" data-page="volume">
        <div class="nav-icon"><i class="fas fa-bolt"></i></div>
        <span>量能监测</span>
      </div>
      <div class="nav-item" data-page="industry">
        <div class="nav-icon"><i class="fas fa-project-diagram"></i></div>
        <span>产业逻辑</span>
      </div>
      <div class="nav-item" data-page="review">
        <div class="nav-icon"><i class="fas fa-tools"></i></div>
        <span>复盘工具</span>
      </div>
      <div class="nav-item" data-page="review_summary">
        <div class="nav-icon"><i class="fas fa-history"></i></div>
        <span>盘后复盘</span>
      </div>
      <div class="nav-item" data-page="history">
        <div class="nav-icon"><i class="fas fa-database"></i></div>
        <span>历史数据</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="status-row">
        <span><span class="status-dot idle" id="dbIcon"></span><span class="status-label">数据服务</span></span>
        <span class="status-value" id="dbStatus">未连接</span>
      </div>
      <div class="status-row">
        <span class="status-label">系统状态</span>
        <span class="status-value" id="st">离线版</span>
      </div>
      <div class="status-row">
        <span class="status-label">数据时间</span>
        <span class="status-value" id="ts">--</span>
      </div>
      <div class="footer-actions" style="margin-top:12px">
        <button class="icon-btn" id="langBtn" title="切换语言">EN</button>
        <button class="icon-btn" id="themeBtn" title="切换主题"><i class="fas fa-sun"></i></button>
        <button class="icon-btn" id="refreshBtn" title="刷新数据"><i class="fas fa-sync-alt"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="main-header">
      <div class="header-title">
        <span id="pageTitle">四因子看板</span>
        <span class="header-subtitle" id="pageSubtitle">实时监控市场情绪、流动性、周期与龙头</span>
      </div>
      <div class="header-actions" id="headerActions">
        <!-- Dynamically injected by app.js -->
      </div>
    </header>

    <div class="main-content" id="mainContent">
      <!-- Page content rendered by app.js -->
    </div>
  </main>
</div>

<!-- Mobile Navigation -->
<nav class="mobile-nav">
  <div class="mobile-nav-item active" data-page="home">
    <i class="fas fa-th-large"></i>
    <span>看板</span>
  </div>
  <div class="mobile-nav-item" data-page="volume">
    <i class="fas fa-bolt"></i>
    <span>量能</span>
  </div>
  <div class="mobile-nav-item" data-page="industry">
    <i class="fas fa-project-diagram"></i>
    <span>产业</span>
  </div>
  <div class="mobile-nav-item" data-page="review">
    <i class="fas fa-tools"></i>
    <span>复盘</span>
  </div>
  <div class="mobile-nav-item" data-page="history">
    <i class="fas fa-database"></i>
    <span>历史</span>
  </div>
</nav>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<script src="app.js"></script>
<script src="anime-plus.js"></script>
</body>
</html>
