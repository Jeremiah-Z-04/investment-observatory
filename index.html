<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>投资观察站 — 汕头游资专用</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
</head>
<body>
<!-- App Container -->
<div id="app" class="app">
  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/>
          <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">投资观察站</div>
        <div class="brand-subtitle">汕头游资专用</div>
      </div>
    </div>

    <nav class="nav-menu" id="navMenu">
      <div class="nav-item active" data-page="home">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
        </span>
        <span class="nav-label">四因子看板</span>
      </div>
      <div class="nav-item" data-page="industry">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M21.17 8.62l-4.28 4.28"/><path d="M12 2V6"/><path d="M12 18v4"/></svg>
        </span>
        <span class="nav-label">产业逻辑</span>
      </div>
      <div class="nav-item" data-page="review">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </span>
        <span class="nav-label">复盘工具</span>
      </div>
      <div class="nav-item" data-page="volume">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
        </span>
        <span class="nav-label">量能监测</span>
      </div>
      <div class="nav-item" data-page="review_summary">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </span>
        <span class="nav-label">盘后复盘</span>
      </div>
      <div class="nav-item" data-page="history">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </span>
        <span class="nav-label">历史数据</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="status-row">
        <span class="status-dot" id="dbIcon"></span>
        <span class="status-text" id="dbStatus">DB --</span>
      </div>
      <div class="status-row">
        <span class="status-label">时间</span>
        <span class="status-value" id="ts">--</span>
      </div>
      <div class="status-row">
        <span class="status-label">状态</span>
        <span class="status-value" id="st">--</span>
      </div>
      <div class="footer-actions">
        <button class="icon-btn" id="themeBtn" title="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="langBtn" title="切换语言">EN</button>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="S.refresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span>刷新数据</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main">
    <div class="main-header" id="mainHeader">
      <div class="header-title">
        <span id="pageTitle">四因子看板</span>
        <span class="header-subtitle" id="pageSubtitle">实时监控市场情绪、流动性、周期与龙头</span>
      </div>
      <div class="header-actions" id="headerActions"></div>
    </div>
    <div class="main-content" id="mainContent"></div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>看板</span>
    </div>
    <div class="mobile-nav-item" data-page="industry">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
      <span>产业</span>
    </div>
    <div class="mobile-nav-item" data-page="review">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
      <span>复盘</span>
    </div>
    <div class="mobile-nav-item" data-page="volume">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
      <span>量能</span>
    </div>
    <div class="mobile-nav-item" data-page="review_summary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/></svg>
      <span>总结</span>
    </div>
  </nav>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box" id="modalBox">
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
